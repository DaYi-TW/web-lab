<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大益的網站實驗室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }
    .subtitle {
      color: #888;
      margin-bottom: 48px;
      font-size: 0.95rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
      display: block;
    }
    .card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }
    .card-tag {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.85rem;
      color: #999;
      line-height: 1.5;
    }
    footer {
      margin-top: 60px;
      color: #555;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1>🧪 Web Lab</h1>
  <p class="subtitle">大益的網站實驗室</p>

  <div class="grid">
    <a class="card" href="mothers-day-2026.html">
      <div class="card-tag">報告 · 2026</div>
      <div class="card-title">母親節檔期效益分析</div>
      <div class="card-desc">2026 母親節活動洞察報告，含銷售趨勢與門市表現分析。</div>
    </a>
  </div>

  <footer>© 2026 DaYi · web-lab</footer>
</body>
</html>
